name: Rust CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all

      - name: cargo build release
        run: cargo build --release

      - name: smoke CLI
        shell: bash
        run: |
          cargo run --release -- version
          cargo run --release -- doctor
          cargo run --release -- pir verify
          cargo run --release -- pir build tests/fixtures/add.py -o add.pirb
          cargo run --release -- pir build tests/fixtures/clamp.py -o clamp.pirb
          cargo run --release -- pir build tests/fixtures/sum_range.py -o sum_range.pirb
          cargo run --release -- pir text tests/fixtures/add.py | head -n 8
          cargo run --release -- codegen c tests/fixtures/add.py --out-dir target/codegen-ci
          test -f target/codegen-ci/add.skw.json

  ffi-smoke:
    name: FFI smoke (Linux)
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}

      - name: FFI end-to-end
        run: bash scripts/ffi-smoke.sh

  legacy-python:
    name: Legacy Python 1.x (ubuntu)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install legacy deps
        run: pip install click tomli tomli-w pytest

      - name: Legacy incremental tests
        run: pytest incremental/tests/ -v
