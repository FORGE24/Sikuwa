# Sikuwa 2.0 Ver.A2 — 示例配置 (schema v2)

[sikuwa]
project_name = "demo"
version = "0.1.0"
schema = 2
engine = "a2"
main_script = "main.py"
compiler_mode = "native"
output_dir = "dist"
build_dir = "build"

[sikuwa.pir]
enabled = true
cache_dir = ".sikuwa/pir"

[sikuwa.pystat]
enabled = true
mode = "progressive"
min_slot = "tagged"
allow_dyn_fallback = true

[sikuwa.ffi]
abi = "1.0"
export_dll = true
export_module_desc = true
link_runtime = true
python_shim = false
visibility = "hidden"
